<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Jester's Chess</title>
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/welcome-chat.css" />
        <link
            rel="shortcut icon"
            href="img/w/jester_icon.png"
            type="image/x-icon"
        />
    </head>

    <body>
        <div id="app">
            <!-- layout principal: tabuleiro + painel lateral -->
            <div id="chess-layout">
                <!-- coluna central: jogador preto / tabuleiro / jogador branco -->
                <div id="board-column">
                    <!-- strip do jogador preto (topo) -->
                    <div class="player-strip" id="strip-black">
                        <div class="player-avatar" id="avatar-black">♟</div>
                        <span class="player-name" id="name-black">Pretas</span>
                        <div class="captured-pieces" id="captured-black"></div>
                        <span class="material-diff" id="diff-black"></span>
                    </div>

                    <!-- wrapper tabuleiro + canvas (seu código original) -->
                    <div id="board-wrapper">
                        <div id="coords-rank"></div>
                        <div id="board"></div>
                        <canvas
                            id="arrow-canvas"
                            width="576"
                            height="576"
                        ></canvas>
                    </div>
                    <div id="coords-file"></div>

                    <!-- strip do jogador branco (base) -->
                    <div class="player-strip" id="strip-white">
                        <div class="player-avatar" id="avatar-white">♙</div>
                        <span class="player-name" id="name-white">Brancas</span>
                        <div class="captured-pieces" id="captured-white"></div>
                        <span class="material-diff" id="diff-white"></span>
                    </div>
                </div>

                <!-- painel lateral de lances -->
                <div id="move-panel">
                    <div class="move-panel-header">Lances</div>
                    <div id="move-list"></div>
                    <div class="move-nav">
                        <button class="nav-btn" id="nav-start" title="Início">
                            ⟪
                        </button>
                        <button class="nav-btn" id="nav-prev" title="Anterior">
                            ‹
                        </button>
                        <button class="nav-btn" id="nav-next" title="Próximo">
                            ›
                        </button>
                        <button class="nav-btn" id="nav-end" title="Fim">
                            ⟫
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/ChuckMatt/chat_bot.js"></script>

        <script src="js/Database/config.js"></script>
        <script src="js/Database/global_functions.js"></script>
        <script src="js/Database/UI_functions.js"></script>

        <script src="js/Code/operation_moves.js"></script>
        <script src="js/Code/set_combat.js"></script>
        <script src="js/Code/check.js"></script>
        <script src="js/Code/pin.js"></script>
        <script src="js/Code/promotion.js"></script>
        <script src="js/Code/castling.js"></script>
        <script src="js/Code/illegal.js"></script>
        <script src="js/Code/draw.js"></script>

        <script src="js/Code/move_execute.js"></script>
        <script src="js/Code/move_pieces.js"></script>

        <script src="js/ChuckMatt/plazas_default.js"></script>
        <script src="js/ChuckMatt/data.js"></script>
        <script src="js/ChuckMatt/alphas.js"></script>
        <script src="js/ChuckMatt/estatistics.js"></script>
        <script src="js/ChuckMatt/methods.js"></script>
        <script src="js/ChuckMatt/brain.js"></script>

        <script src="js/UI/events.js"></script>
        <script src="js/UI/draw.js"></script>
        <script src="js/UI/interface.js"></script>
        <script src="js/UI/interactions.js"></script>
        <script src="js/UI/move_log.js"></script>

        <script src="js/UI/welcome_chat.js"></script>

        <script>
            // =========================
            //INICIALIZAÇÃO FINAL
            //=========================
            renderBoard()

            // 1. Exibe o modal de boas-vindas ANTES de qualquer coisa.
            showWelcomeModal().then(({ playerName, opponentName, mode }) => {
                
                // 3. Configura times (mantém sua lógica original)
                
                if (mode === 'ai') {
                    const [PLAYER, CHUCK] = set_RandomTeamsAI()
                    PLAYING_WITH_CHUCKMATT = true
                    setPlayerInfo(PLAYER, playerName, PLAYERS_IMG[PLAYER == 'white'? 'w': 'b'])

                    // 2. Inicializa as abas do painel (Lances | Chat)
                    initPanelTabs(playerName, PLAYERS_IMG[PLAYER == 'white'? 'w': 'b'])

                    setPlayerInfo(
                        CHUCK,
                        'ChuckMatt (AI)',
                        'img/ChuckMattIcon_beta.png',
                    )
                } else {
                    // modo local: usa os dois nomes nos strips */
                    const chatTab = document.querySelector(
                        '.panel-tab[data-tab="chat"]',
                    )
                    if (chatTab) {
                        chatTab.style.opacity = '0.3'
                        chatTab.style.pointerEvents = 'none'
                        chatTab.title = 'Chat indisponível no modo local'
                    }
                    document
                        .querySelector('.panel-tab[data-tab="moves"]')
                        ?.click()
                    setPlayerInfo('white', playerName, PLAYERS_IMG.w)
                    setPlayerInfo('black', opponentName, PLAYERS_IMG.b)
                }

                // 4. Renderiza o tabuleiro
                renderBoard()
                ctx.fillStyle = 'red'
                ctx.fillRect(100, 100, 100, 100)
                start.play()
                drawArrows()

                set_initial_team()
                set_initial_combat()
                console.clear()

                // 5. Mensagens de boas-vindas no chat */
                if (mode === 'ai') {
                    setTimeout(() => {
                        sendBotMessage(get_randomMessage(INICIATE_CHAT_BOT))
                    }, 600)
                }

                // 6. Jogada da IA (apenas no modo AI) */
                if (mode === 'ai' && PLAY_TURN.chuck == TURN) {
                    setTimeout(() => {
                        SET_ChuckMatt_Move()
                    }, 1000)
                }
                setTurn(TURN)
                Set_MemoryMovesTEAM(TURN)
            })


            // Bot envia mensagem:
            //sendBotMessage('Xeque! ♞');

            // Sistema envia como jogador:
            //sendPlayerMessage('Jogada registrada.');
        </script>
    </body>
</html>
